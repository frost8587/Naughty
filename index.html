<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 😈</title>

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
font-family:Arial, sans-serif;
background:linear-gradient(160deg,#0f0f0f,#1a001f,#2b0033);
height:100vh;
overflow:hidden;
color:white;
margin:0;
}

h1{
font-size:clamp(26px,5vw,40px);
padding:20px;
max-width:90%;
text-shadow:0 0 15px rgba(255,0,120,0.8);
}

button{
padding:16px 34px;
font-size:20px;
border:none;
border-radius:14px;
margin:12px;
cursor:pointer;
}

#yes{
background:linear-gradient(135deg,#ff0080,#ff4da6);
color:white;
box-shadow:0 0 20px rgba(255,0,120,0.8);
}

.no{
background:#333;
color:white;
position:absolute;
}

.audioBtn{
position:fixed;
top:20px;
right:20px;
font-size:24px;
background:#ff0080;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.heart{
position:absolute;
font-size:26px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

#spider{
position:fixed;
top:100px;
left:50%;
font-size:100px;
pointer-events:none;
transition:transform 0.15s linear;
z-index:9999;
}

</style>

</head>

<body>

<button class="audioBtn" onclick="toggleMusic()">🔊</button>

<h1 id="question">Do you want to be naughty with me, babyboo? 😈</h1>

<div>
<button id="yes">YES 😏</button>
<button class="no" id="no">NO 🙃</button>
</div>

<div class="flash" id="flash"></div>

<div id="spider" style="display:none;">🕷️</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/02/28/audio_5d6b8e0f8c.mp3">
</audio>

<script>

let yesSize=20
let step=0
let playing=false
let finished=false
let spiderActive=false

let questions=[

"Are you sure about that? 🤨",
"Maybe you're shy? 😏",
"What if I buy you food? 🍔",
"Chocolate first? 🍫",
"Movie night maybe? 🎬",
"You can't escape this question 👀",
"Stop trying to press NO 😂",
"Just press YES already 😈",
"Come on... don't pretend you're innocent 😇",
"Your finger keeps missing YES 🤔",
"Is that a NO or are you just teasing me? 😏",
"You know curiosity always wins 👀",
"Last chance before I make the YES button HUGE 😈"

]

let no=document.getElementById("no")
let yes=document.getElementById("yes")
let spider=document.getElementById("spider")

function toggleMusic(){

let music=document.getElementById("music")

if(!playing){
music.volume=0.6
music.play()
playing=true
}else{
music.pause()
playing=false
}

}

function moveButton(){

if(finished) return

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-200)+120

no.style.left=x+"px"
no.style.top=y+"px"

yesSize+=6
yes.style.fontSize=yesSize+"px"

if(step<questions.length){
document.getElementById("question").innerHTML=questions[step]
step++
}

if(step==5){
duplicateNo()
}

}

no.addEventListener("mouseover",moveButton)
no.addEventListener("touchstart",moveButton)

function duplicateNo(){

for(let i=0;i<3;i++){

let btn=document.createElement("button")

btn.innerHTML="NO 😅"
btn.className="no"

btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"

btn.addEventListener("mouseover",moveButton)

document.body.appendChild(btn)

}

}

yes.addEventListener("click",yesClick)

function yesClick(){

if(finished) return
finished=true

flashEffect()

setTimeout(()=>{
document.body.innerHTML="<h1>Screenshot captured 📸</h1>"
},700)

setTimeout(()=>{
document.body.innerHTML="<h1>🔮 Connecting to Voodoo spirits...</h1>"
},1800)

setTimeout(()=>{
document.body.innerHTML="<h1>🚶‍♂️🚶‍♀️🚶‍♂️ People are watching...</h1>"
},3000)

setTimeout(()=>{
activateSpider()
},4200)

setTimeout(()=>{
spiderActive=false
document.body.innerHTML="<h1>Just kidding 😂</h1>"
},6500)

setTimeout(()=>{
document.body.innerHTML="<h1>I know u like me ❤️</h1>"
setInterval(createHeart,200)
},7800)

}

function activateSpider(){

spider.style.display="block"
spiderActive=true

}

document.addEventListener("mousemove",followPointer)
document.addEventListener("touchmove",followPointer)

function followPointer(e){

if(!spiderActive) return

let x,y

if(e.touches){
x=e.touches[0].clientX
y=e.touches[0].clientY
}else{
x=e.clientX
y=e.clientY
}

spider.style.left=x+"px"
spider.style.top=y+"px"

}

function flashEffect(){

let flash=document.getElementById("flash")

flash.style.opacity="1"

setTimeout(()=>{
flash.style.opacity="0"
},200)

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},7000)

}

setInterval(createHeart,900)

</script>

</body>
</html>
