<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question рҹҳҲ</title>

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
font-family:Arial,sans-serif;

background:linear-gradient(-45deg,#0f0f0f,#1a001f,#2b0033,#120018,#1f002b);
background-size:400% 400%;
animation:bgMove 12s ease infinite;

height:100vh;
margin:0;
overflow:hidden;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:clamp(26px,5vw,40px);
padding:20px;
max-width:90%;
text-shadow:0 0 15px rgba(255,0,120,0.8);
}

button{
padding:16px 34px;
font-size:20px;
border:none;
border-radius:14px;
margin:12px;
cursor:pointer;
}

#yes{
background:linear-gradient(135deg,#ff0080,#ff4da6);
color:white;
box-shadow:0 0 20px rgba(255,0,120,0.8);
}

.no{
background:#333;
color:white;
position:absolute;
}

.audioBtn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:#ff0080;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.fade{
opacity:0;
transition:opacity 0.6s ease;
}

.fade.show{
opacity:1;
}

.heart{
position:absolute;
font-size:22px;
opacity:0.7;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.8);opacity:0;}
20%{opacity:0.8;}
100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#0f0f0f;
z-index:9999;
}

#progressBar{
width:220px;
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

#progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff0080,#ff4da6);
}

</style>
</head>

<body>

<div id="loader">
<h2>Loading question...</h2>
<div id="progressBar">
<div id="progress"></div>
</div>
</div>

<div id="mainContent" style="display:none;">

<button class="audioBtn" onclick="toggleMusic()">рҹ”Ҡ</button>

<h1 id="question">Do you want to be naughty with me, babyboo? рҹҳҲ</h1>

<div>
<button id="yes">YES рҹҳҸ</button>
<button class="no" id="no">NO рҹҷғ</button>
</div>

</div>

<div class="flash" id="flash"></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/02/28/audio_5d6b8e0f8c.mp3">
</audio>

<script>

let finished=false
let playing=false
let step=0

let no=document.getElementById("no")
let yes=document.getElementById("yes")

let questions=[
"Are you sure about that? рҹӨЁ",
"Maybe you're shy? рҹҳҸ",
"What if I buy you food? рҹҚ”",
"Chocolate first? рҹҚ«",
"Movie night maybe? рҹҺ¬",
"You can't escape this question рҹ‘Җ",
"Stop trying to press NO рҹҳӮ",
"Just press YES already рҹҳҲ",
"Come on... don't pretend you're innocent рҹҳҮ",
"Your finger keeps missing YES рҹӨ”"
]

function toggleMusic(){
let music=document.getElementById("music")

if(!playing){
music.volume=0.6
music.play()
playing=true
}else{
music.pause()
playing=false
}
}

function moveButton(){

if(finished) return

let yesRect=yes.getBoundingClientRect()

let safeX1=yesRect.left-150
let safeX2=yesRect.right+150
let safeY1=yesRect.top-120
let safeY2=yesRect.bottom+120

let x,y

do{
x=Math.random()*(window.innerWidth-120)
y=Math.random()*(window.innerHeight-200)+120
}
while(x>safeX1 && x<safeX2 && y>safeY1 && y<safeY2)

no.style.left=x+"px"
no.style.top=y+"px"

if(step<questions.length){
document.getElementById("question").innerHTML=questions[step]
step++
}

}

no.addEventListener("mouseover",moveButton)
no.addEventListener("touchstart",moveButton)

document.addEventListener("mousemove",avoidCursor)
document.addEventListener("touchmove",avoidCursor)

function avoidCursor(e){

if(finished) return

let cursorX=e.touches?e.touches[0].clientX:e.clientX
let cursorY=e.touches?e.touches[0].clientY:e.clientY

let rect=no.getBoundingClientRect()

let distX=Math.abs(cursorX-rect.left)
let distY=Math.abs(cursorY-rect.top)

if(distX<120 && distY<80){
moveButton()
}

}

yes.addEventListener("click",yesClick)

function showMessage(text){

document.body.innerHTML='<h1 id="msg" class="fade">'+text+'</h1>'

setTimeout(()=>{
document.getElementById("msg").classList.add("show")
},50)

}

function yesClick(){

if(finished) return
finished=true

flashEffect()

setTimeout(()=>{
showMessage("Screenshot captured рҹ“ё")
},700)

setTimeout(()=>{
showMessage("рҹҡ¶вҖҚвҷӮпёҸрҹҡ¶вҖҚвҷҖпёҸрҹҡ¶вҖҚвҷӮпёҸ People are watching...")
},2000)

setTimeout(()=>{
showMessage("Just kidding рҹҳӮ")
},3500)

setTimeout(()=>{
showMessage("I know u gonna miss me вқӨпёҸ")
setInterval(createHeart,200)
},5000)

}

function flashEffect(){

let flash=document.getElementById("flash")

flash.style.opacity="1"

setTimeout(()=>{
flash.style.opacity="0"
},200)

}

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="вқӨпёҸ"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(18+Math.random()*15)+"px"
heart.style.animationDuration=(8+Math.random()*6)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},14000)

}

setInterval(createBackgroundHeart,1200)

function createBackgroundHeart(){
createHeart()
}

let progress=0

let loading=setInterval(()=>{

progress+=5
document.getElementById("progress").style.width=progress+"%"

if(progress>=100){

clearInterval(loading)

document.getElementById("loader").style.display="none"
document.getElementById("mainContent").style.display="block"

}

},80)

</script>

</body>
</html>
